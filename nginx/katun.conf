# nginx reverse proxy for Katun2052 + self-hosted Supabase.
# Two hosts: the SPA (static dist/) and the Supabase API (proxied to kong:8000).
# Plain HTTP here; add TLS with certbot once DNS points at this host:
#   sudo certbot --nginx -d tu-dominio.com -d api.tu-dominio.com
# Then point the app .env VITE_SUPABASE_URL at https://api.tu-dominio.com and rebuild.
#
# Place under /etc/nginx/sites-available/ (system nginx) or mount into an nginx container.
# Replace server_name values and the `root` path with your real domain / deploy path.

# ---- App (React SPA) ----
server {
    listen 80;
    server_name tu-dominio.com;

    root /var/www/katun.local;
    index index.html;

    # React Router: every route falls back to index.html (README §6).
    location / {
        try_files $uri $uri/ /index.html =404;
    }
}

# ---- Supabase API (kong gateway) ----
server {
    listen 80;
    server_name api.tu-dominio.com;

    # System nginx: 127.0.0.1:8000. nginx-in-compose: http://kong:8000.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Realtime websockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Storage uploads up to 50 MB (matches documents bucket limit)
        client_max_body_size 50m;
    }
}
